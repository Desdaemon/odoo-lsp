cognitive-complexity-threshold = 20

[[disallowed-methods]]
path = "tree_sitter::Node::named_child"
reason = "tree-sitter does not add automatically filter extras, replace with"
replacement = "python_nth_named_child::<NTH>"

[[disallowed-methods]]
path = "tree_sitter::Node::next_named_sibling"
reason = "tree-sitter does not automatically filter extras, replace with"
replacement = "python_next_named_sibling"

[[await-holding-invalid-types]]
path = "dashmap::mapref::one::RefMut"
reason = "Would deadlock if same thread wants to acquire a reference"

[[await-holding-invalid-types]]
path = "dashmap::mapref::one::Ref"
reason = "Would deadlock if same thread wants to acquire a reference"

[[await-holding-invalid-types]]
path = "dashmap::mapref::multiple::RefMulti"
reason = "iter() holds a shard read-lock; holding it across await can deadlock a writer"

[[await-holding-invalid-types]]
path = "dashmap::mapref::multiple::RefMutMulti"
reason = "iter_mut() holds a shard write-lock; holding it across await can deadlock"

[[await-holding-invalid-types]]
path = "std::sync::RwLockReadGuard"
reason = "by_prefix tries use std RwLock; holding a guard across await can block a worker thread"

[[await-holding-invalid-types]]
path = "std::sync::RwLockWriteGuard"
reason = "by_prefix tries use std RwLock; holding a guard across await can block a worker thread"

[[await-holding-invalid-types]]
path = "std::sync::MutexGuard"
reason = "holding a std Mutex guard across await can block a worker thread"
